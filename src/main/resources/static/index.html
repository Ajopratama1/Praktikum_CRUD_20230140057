<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMY Dev - User Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-color: #6366f1;
            --bg-body: #f1f5f9;
            --card-radius: 20px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--primary-dark);
        }

        /* Profile Header Style */
        .profile-header {
            background: var(--primary-dark);
            color: white;
            padding: 60px 0 100px 0;
            border-radius: 0 0 50px 50px;
            margin-bottom: -60px;
        }

        .dev-badge {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--accent-color);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 10px;
        }

        .card {
            border: none;
            border-radius: var(--card-radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .form-control {
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            border-color: var(--accent-color);
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
        }

        .btn-primary:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
        }

        .table-container {
            background: white;
            border-radius: var(--card-radius);
            padding: 20px;
        }

        .id-pill {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #64748b;
        }

        .action-icon {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: 0.3s;
        }

        .action-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<header class="profile-header text-center">
    <div class="container">
        <span class="dev-badge"><i class="fas fa-code"></i> Engineering Student @ UMY</span>
        <h1 class="display-5 fw-800">User Management Console</h1>
        <p class="opacity-50">Sistem pengelolaan database pengguna praktikum-1</p>
    </div>
</header>

<main class="container">
    <div class="row justify-content-center mb-5">
        <div class="col-lg-10">
            <div class="card p-4">
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-dark text-white p-3 rounded-4 me-3">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h4 class="mb-0 fw-bold" id="formTitle">Tambah User Baru</h4>
                </div>

                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Nama Pengguna</label>
                            <input type="text" id="userName" class="form-control" placeholder="Masukkan nama lengkap" required>
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold text-muted mb-2">Usia</label>
                            <input type="number" id="userAge" class="form-control" placeholder="Tahun" required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button type="submit" id="btnSubmit" class="btn btn-primary w-100">
                                <i class="fas fa-save me-2"></i> Simpan
                            </button>
                            <button type="button" id="btnCancel" class="btn btn-light" style="display:none;" onclick="resetForm()">
                                Batal
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Database Overview</h5>
                <span class="badge rounded-pill bg-dark py-2 px-3" id="userCount">0 Users</span>
            </div>

            <div class="table-container shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle border-0">
                        <thead class="bg-light">
                        <tr>
                            <th class="border-0 text-uppercase small py-3 px-4">Informasi Profil</th>
                            <th class="border-0 text-uppercase small py-3">ID Sistem</th>
                            <th class="border-0 text-uppercase small py-3 text-end px-4">Opsi Kontrol</th>
                        </tr>
                        </thead>
                        <tbody id="userTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
    // Logic JS tetap sama dengan script sebelumnya agar fungsionalitas tidak berubah
    const apiUrl = '/api/users';
    let isUpdate = false;

    $(document).ready(function() {
        loadUsers();
        $('#userForm').submit(function(e) {
            e.preventDefault();
            const userData = {
                name: $('#userName').val(),
                age: parseInt($('#userAge').val())
            };
            if (isUpdate) { updateUser($('#userId').val(), userData); }
            else { addUser(userData); }
        });
    });

    function loadUsers() {
        $.get(apiUrl, function(response) {
            let rows = '';
            const users = response.data || [];
            $('#userCount').text(`${users.length} Users`);

            if(users.length === 0) {
                rows = `<tr><td colspan="3" class="text-center py-5 text-muted small">Belum ada data tersedia.</td></tr>`;
            } else {
                users.forEach(user => {
                    rows += `
                        <tr>
                            <td class="px-4">
                                <div class="d-flex align-items-center">
                                    <div class="avatar-sm bg-light text-dark rounded-3 p-2 me-3">
                                        <i class="fas fa-user-circle fa-lg"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold mb-0">${user.name}</div>
                                        <div class="small text-muted">${user.age} Tahun</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="id-pill">${user.id}</span></td>
                            <td class="text-end px-4">
                                <button class="btn btn-outline-dark btn-sm me-1 rounded-3" onclick="editUser('${user.id}', '${user.name}', ${user.age})">
                                    <i class="far fa-edit"></i>
                                </button>
                                <button class="btn btn-outline-danger btn-sm rounded-3" onclick="deleteUser('${user.id}')">
                                    <i class="far fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            $('#userTableBody').html(rows);
        });
    }

    function addUser(data) {
        $.ajax({
            url: apiUrl, type: 'POST', contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() { resetForm(); loadUsers(); },
            error: function() { alert('Gagal menambah user.'); }
        });
    }

    function updateUser(id, data) {
        $.ajax({
            url: `${apiUrl}/${id}`, type: 'PUT', contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() { resetForm(); loadUsers(); },
            error: function() { alert('Gagal memperbarui user.'); }
        });
    }

    function deleteUser(id) {
        if(confirm('Hapus data pengguna secara permanen?')) {
            $.ajax({
                url: `${apiUrl}/${id}`, type: 'DELETE',
                success: function() { loadUsers(); }
            });
        }
    }

    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name);
        $('#userAge').val(age);
        $('#formTitle').text('Update Informasi User');
        $('#btnSubmit').html('<i class="fas fa-check"></i> Update').removeClass('btn-primary').addClass('btn-success');
        $('#btnCancel').show();
        isUpdate = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        $('#userId').val('');
        $('#userName').val('');
        $('#userAge').val('');
        $('#formTitle').text('Tambah User Baru');
        $('#btnSubmit').html('<i class="fas fa-save me-2"></i> Simpan').removeClass('btn-success').addClass('btn-primary');
        $('#btnCancel').hide();
        isUpdate = false;
    }
</script>
</body>
</html>
